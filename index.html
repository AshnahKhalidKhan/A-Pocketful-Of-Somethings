<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pocketful of Somethings</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Roboto+Mono:wght@300;400;500&display=swap');

:root {
  --bg: #07070f;
  --surface: #0f0f1a;
  --border: rgba(255,255,255,0.08);
  --text: rgba(255,255,255,0.85);
  --muted: rgba(255,255,255,0.35);
  --faint: rgba(255,255,255,0.1);
  --done: #1D9E75;
  --accent: #7F77DD;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  font-family: 'Roboto', sans-serif;
  color: var(--text);
  display: flex; flex-direction: column;
}

/* ── header ── */
header {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  padding: 10px 18px 9px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0; z-index: 10; position: relative;
}
.xp-wrap { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 120px; }
.xp-track { flex: 1; height: 3px; background: var(--faint); border-radius: 99px; overflow: hidden; }
.xp-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.8s cubic-bezier(.25,.8,.25,1); }
.xp-label { font-family: 'Roboto Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; }
.legend { display: flex; gap: 14px; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 6px; font-family: 'Roboto Mono', monospace; font-size: 10px; color: var(--muted); }
.leg-orb { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
.leg-achieved { background: var(--done); box-shadow: 0 0 6px rgba(29,158,117,0.6); }
.leg-pending { background: transparent; border: 1.5px dashed rgba(255,255,255,0.25); }
.header-right { display: flex; align-items: center; gap: 8px; }
.visitor-tag {
  font-family: 'Roboto Mono', monospace; font-size: 10px;
  padding: 4px 10px; border-radius: 99px;
  background: rgba(127,119,221,0.08); border: 0.5px solid rgba(127,119,221,0.25);
  color: var(--accent); white-space: nowrap; display: none;
}
.admin-bar { display: none; align-items: center; gap: 8px; }
body.admin-mode .admin-bar { display: flex; }
.admin-indicator {
  font-family: 'Roboto Mono', monospace; font-size: 10px;
  background: rgba(29,158,117,0.1); border: 0.5px solid rgba(29,158,117,0.35);
  color: var(--done); padding: 4px 10px; border-radius: 99px;
}
.exit-btn {
  font-family: 'Roboto Mono', monospace; font-size: 10px;
  padding: 4px 12px; border-radius: 99px; cursor: pointer;
  border: 0.5px solid var(--border); background: transparent; color: var(--muted); transition: all 0.15s;
}
.exit-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
.btn {
  font-family: 'Roboto', sans-serif; font-size: 12px; font-weight: 600;
  padding: 7px 15px; border-radius: 99px; cursor: pointer;
  border: 0.5px solid var(--border); background: transparent; color: var(--muted);
  transition: all 0.15s; letter-spacing: 0.02em;
}
.btn:hover { background: var(--faint); color: var(--text); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { opacity: 0.88; }
.btn.danger { border-color: rgba(220,60,60,0.4); color: rgba(220,60,60,0.7); }
.btn.danger:hover { background: rgba(220,60,60,0.1); color: rgba(220,60,60,1); }
.btn.ghost { border-color: rgba(127,119,221,0.35); color: var(--accent); font-size: 11px; padding: 6px 13px; }
.btn.ghost:hover { background: rgba(127,119,221,0.1); border-color: var(--accent); }
#add-btn { display: none; }
body.admin-mode #add-btn { display: block; }

/* ── canvas wrapper ── */
#canvas-wrap {
  flex: 1; position: relative; overflow: hidden;
}
#pixi-canvas { display: block; pointer-events: none; z-index: 1; position: absolute; inset: 0; }

/* DOM overlay for labels (Pixi handles circles, DOM handles text) */
#label-layer {
  position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 2;
}
.orb-label {
  --r: 0px;
  position: absolute; transform: translate(-50%, -50%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: none; text-align: center;
  transition: opacity 0.3s;
  overflow: hidden; border-radius: 50%;
}
.orb-emoji { line-height: 1; display: block; font-size: calc(var(--r) * 0.38); }
.orb-name {
  font-family: 'Roboto', sans-serif; font-weight: 600;
  color: rgba(255,255,255,0.92); line-height: 1.2;
  text-align: center; word-break: break-word;
  text-shadow: 0 1px 4px rgba(0,0,0,0.7);
  font-size: max(9px, calc(var(--r) * 0.19));
  width: calc(var(--r) * 1.0);
  margin-top: calc(var(--r) * 0.05);
}
.orb-img { display: block; flex-shrink: 0; width: calc(var(--r) * 0.60); height: calc(var(--r) * 0.60); object-fit: contain; }
/* clickable hit areas (invisible, sit on top) */
.orb-hit {
  position: absolute; border-radius: 50%; cursor: pointer;
  transform: translate(-50%, -50%);
  background: transparent;
  pointer-events: all; z-index: 3;
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
}
.orb-hit:hover { transform: translate(-50%, -50%) scale(1.08); z-index: 5; }

/* ── secret knock dots ── */
#knock-dots {
  position: fixed; bottom: 8px; left: 8px;
  display: flex; gap: 4px; z-index: 200; pointer-events: none;
}
.k-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: 0; transition: opacity 0.25s; }
.k-dot.lit { opacity: 0.7; }

/* ── overlays ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.72); z-index: 100;
  align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 18px; padding: 2rem 1.75rem 1.5rem;
  width: min(380px, 93vw); position: relative;
  max-height: 92dvh; overflow-y: auto;
}
.modal-close {
  position: absolute; top: 14px; right: 16px;
  background: none; border: none; color: var(--muted);
  font-size: 18px; cursor: pointer;
}
.modal-close:hover { color: var(--text); }
.modal-emoji { font-size: 48px; text-align: center; margin-bottom: 12px; }
.modal-img-preview { width: 72px; height: 72px; display: block; margin: 0 auto 12px; object-fit: contain; }
.modal-name { font-size: 18px; font-weight: 700; color: var(--text); text-align: center; margin-bottom: 6px; }
.modal-desc { font-size: 13px; color: var(--muted); line-height: 1.65; text-align: center; margin-bottom: 14px; }
.modal-pills { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
.pill { font-family: 'Roboto Mono', monospace; font-size: 11px; padding: 3px 10px; border-radius: 99px; border: 0.5px solid var(--border); color: var(--muted); }
.pill.achieved { border-color: rgba(29,158,117,0.5); color: var(--done); }
.pill.pending-pill { border-color: rgba(127,119,221,0.4); color: var(--accent); }
.modal-admin-actions { display: none; margin-top: 1.1rem; gap: 8px; justify-content: center; }
body.admin-mode .modal-admin-actions { display: flex; }

/* ── form ── */
.form-title { font-size: 16px; font-weight: 700; margin-bottom: 1.25rem; }
.field { margin-bottom: 13px; }
.field label { display: block; font-size: 11px; font-family: 'Roboto Mono', monospace; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.05em; }
.field input, .field textarea, .field select {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 0.5px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'Roboto', sans-serif; font-size: 14px;
  padding: 9px 12px; outline: none; transition: border-color 0.15s; appearance: none;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: rgba(127,119,221,0.5); }
.field input[type=file] { padding: 7px 10px; font-size: 12px; color: var(--muted); }
.field textarea { resize: vertical; min-height: 60px; }
.field select option { background: #1a1a2e; }
.icon-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
.itab {
  font-family: 'Roboto Mono', monospace; font-size: 11px; padding: 5px 12px;
  border-radius: 99px; border: 0.5px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer; transition: all 0.13s;
}
.itab.active { border-color: var(--accent); color: var(--accent); background: rgba(127,119,221,0.1); }
.icon-panel { display: none; }
.icon-panel.active { display: block; }
.emoji-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 5px; }
.ep-btn {
  font-size: 19px; border-radius: 7px; border: 0.5px solid var(--border);
  background: transparent; cursor: pointer; padding: 3px; text-align: center; transition: background 0.12s;
}
.ep-btn:hover, .ep-btn.selected { background: rgba(127,119,221,0.25); border-color: var(--accent); }
.ep-btn img { width: 19px; height: 19px; display: block; pointer-events: none; }
.icon-search {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 0.5px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'Roboto', sans-serif; font-size: 13px;
  padding: 7px 10px; outline: none; margin-bottom: 8px; display: block;
  transition: border-color 0.15s;
}
.icon-search:focus { border-color: rgba(127,119,221,0.5); }
.icon-search::placeholder { color: var(--muted); }
.icon-preview-wrap { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
.icon-preview { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 0.5px solid var(--border); display: none; }
.icon-preview.show { display: block; }
.status-toggle { display: flex; gap: 8px; }
.status-btn {
  flex: 1; padding: 8px; border-radius: 8px; border: 0.5px solid var(--border);
  background: transparent; color: var(--muted); font-family: 'Roboto', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.status-btn.sel-achieved { border-color: var(--done); background: rgba(29,158,117,0.12); color: var(--done); }
.status-btn.sel-pending  { border-color: var(--accent); background: rgba(127,119,221,0.1); color: var(--accent); }
.form-actions { display: flex; gap: 8px; margin-top: 1.1rem; }
.form-actions .btn { flex: 1; }

/* ── password modal ── */
.pw-modal { width: min(300px, 90vw); }
.pw-title { font-size: 15px; font-weight: 700; text-align: center; margin-bottom: 4px; }
.pw-sub { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 1.25rem; font-family: 'Roboto Mono', monospace; }
.pw-error { font-size: 11px; color: rgba(220,80,80,0.85); text-align: center; margin-top: 8px; font-family: 'Roboto Mono', monospace; min-height: 16px; }

/* ── onboarding ── */
.onboard-modal { width: min(480px, 95vw); }
.onboard-steps { display: flex; gap: 6px; margin-bottom: 1.5rem; }
.ostep { flex: 1; height: 3px; border-radius: 99px; background: var(--faint); transition: background 0.3s; }
.ostep.done { background: var(--accent); }
.ostep.active { background: rgba(127,119,221,0.5); }
.onboard-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.onboard-sub { font-size: 13px; color: var(--muted); line-height: 1.65; margin-bottom: 1.25rem; }
.onboard-sub a { color: var(--accent); text-decoration: none; }
.onboard-sub a:hover { text-decoration: underline; }
.onboard-sub code { background: rgba(255,255,255,0.07); padding: 2px 6px; border-radius: 4px; font-family: 'Roboto Mono',monospace; font-size: 11px; }
.onboard-step-content { min-height: 110px; }
.onboard-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
.onboard-actions .btn { flex: 1; }
.onboard-error { font-family: 'Roboto Mono', monospace; font-size: 11px; color: rgba(220,80,80,0.8); margin-top: 8px; min-height: 16px; }
.onboard-success { text-align: center; padding: 0.5rem 0; }
.onboard-success-icon { font-size: 44px; margin-bottom: 10px; }
.onboard-success-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.onboard-success-sub { font-size: 13px; color: var(--muted); line-height: 1.65; margin-bottom: 1.25rem; }
.copy-url-wrap { display: flex; gap: 8px; align-items: center; }
.copy-url-input {
  flex: 1; background: rgba(255,255,255,0.04); border: 0.5px solid var(--border);
  border-radius: 8px; color: var(--muted); font-family: 'Roboto Mono', monospace;
  font-size: 10px; padding: 8px 10px; outline: none;
}
.copy-btn {
  font-family: 'Roboto Mono', monospace; font-size: 11px; padding: 7px 14px;
  border-radius: 8px; cursor: pointer; border: 0.5px solid var(--accent);
  background: transparent; color: var(--accent); transition: all 0.15s; white-space: nowrap;
}
.copy-btn:hover { background: rgba(127,119,221,0.1); }

/* ── delete confirm ── */
.del-sub { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 1.5rem; font-family: 'Roboto Mono', monospace; }

/* ── sync status ── */
#sync-status {
  position: fixed; bottom: 28px; right: 16px;
  font-family: 'Roboto Mono', monospace; font-size: 10px;
  padding: 4px 10px; border-radius: 99px; z-index: 200;
  transition: opacity 0.4s; pointer-events: none; opacity: 0;
}
</style>
</head>
<body>

<header>
  <div class="xp-wrap">
    <span class="xp-label" id="xp-lbl">0 XP</span>
    <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    <span class="xp-label" id="xp-pct">0%</span>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="leg-orb leg-achieved"></div>achieved</div>
    <div class="legend-item"><div class="leg-orb leg-pending"></div>in progress</div>
  </div>
  <div class="header-right">
    <div class="visitor-tag" id="visitor-tag"></div>
    <div class="admin-bar">
      <span class="admin-indicator">admin</span>
      <button class="exit-btn" onclick="exitAdmin()">exit ✕</button>
    </div>
    <button class="btn primary" id="add-btn" onclick="openAddModal()">+ add</button>
    <button class="btn ghost" onclick="openOnboarding()">make your own ↗</button>
  </div>
</header>

<div id="canvas-wrap">
  <div id="label-layer"></div>
</div>

<div id="knock-dots">
  <div class="k-dot" id="kd0"></div>
  <div class="k-dot" id="kd1"></div>
  <div class="k-dot" id="kd2"></div>
</div>
<div id="sync-status"></div>

<!-- detail modal -->
<div class="overlay" id="detail-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('detail-overlay')">✕</button>
    <div id="m-icon-wrap"></div>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-desc" id="m-desc"></div>
    <div class="modal-pills" id="m-pills"></div>
    <div class="modal-admin-actions" id="m-admin-actions">
      <button class="btn" id="m-edit-btn" onclick="adminEditFromDetail()">edit</button>
      <button class="btn" id="m-toggle-btn" onclick="adminToggleFromDetail()">mark achieved</button>
      <button class="btn danger" onclick="adminDeleteFromDetail()">remove</button>
    </div>
  </div>
</div>

<!-- password modal -->
<div class="overlay" id="pw-overlay">
  <div class="modal pw-modal">
    <button class="modal-close" onclick="closeModal('pw-overlay')">✕</button>
    <div class="pw-title">Enter passphrase</div>
    <div class="pw-sub">admin access required</div>
    <div class="field">
      <input type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPw()">
    </div>
    <div class="pw-error" id="pw-error"></div>
    <div class="form-actions" style="margin-top:.75rem">
      <button class="btn" onclick="closeModal('pw-overlay')">cancel</button>
      <button class="btn primary" onclick="checkPw()">unlock</button>
    </div>
  </div>
</div>

<!-- add/edit modal -->
<div class="overlay" id="add-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('add-overlay')">✕</button>
    <div class="form-title" id="form-title">New something</div>
    <input type="hidden" id="f-edit-id" value="">
    <div class="field">
      <label>Name</label>
      <input id="f-name" type="text" placeholder="e.g. Published paper" maxlength="32">
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="f-desc" placeholder="What does this mean to you?"></textarea>
    </div>
    <div class="field">
      <label>Significance</label>
      <select id="f-tier">
        <option value="1">Tiny (1)</option>
        <option value="2">Small (2)</option>
        <option value="3" selected>Medium (3)</option>
        <option value="4">Large (4)</option>
        <option value="5">Huge (5)</option>
      </select>
    </div>
    <div class="field">
      <label>Icon</label>
      <div class="icon-tabs">
        <button class="itab active" data-tab="emoji"  onclick="switchIconTab('emoji',this)">icons</button>
        <button class="itab"        data-tab="upload" onclick="switchIconTab('upload',this)">upload</button>
        <button class="itab"        data-tab="url"    onclick="switchIconTab('url',this)">link</button>
      </div>
      <div class="icon-panel active" id="ip-emoji">
        <input type="text" class="icon-search" id="icon-search" placeholder="search 200k+ icons…" oninput="searchIcons(this.value)">
        <div class="emoji-grid" id="emoji-grid"></div>
      </div>
      <div class="icon-panel" id="ip-upload">
        <div class="icon-preview-wrap">
          <input type="file" id="f-img-file" accept="image/*,.svg" onchange="handleFileUpload(this)">
          <img id="upload-preview" class="icon-preview" src="" alt="">
        </div>
      </div>
      <div class="icon-panel" id="ip-url">
        <div class="icon-preview-wrap">
          <input type="text" id="f-img-url" placeholder="https://..." oninput="handleUrlInput(this)">
          <img id="url-preview" class="icon-preview" src="" alt="">
        </div>
      </div>
    </div>
    <div class="field">
      <label>Status</label>
      <div class="status-toggle">
        <button class="status-btn sel-achieved" id="sb-achieved" onclick="selectStatus('achieved')">✦ Achieved</button>
        <button class="status-btn" id="sb-pending" onclick="selectStatus('pending')">◌ In progress</button>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('add-overlay')">Cancel</button>
      <button class="btn primary" onclick="saveSkill()">Save</button>
    </div>
  </div>
</div>

<!-- delete confirm -->
<div class="overlay" id="del-overlay">
  <div class="modal pw-modal">
    <div class="pw-title">Remove this?</div>
    <div class="del-sub" id="del-name"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('del-overlay')">cancel</button>
      <button class="btn danger" onclick="confirmDelete()">remove</button>
    </div>
  </div>
</div>

<!-- onboarding modal -->
<div class="overlay" id="onboard-overlay">
  <div class="modal onboard-modal">
    <button class="modal-close" onclick="closeModal('onboard-overlay')">✕</button>
    <div class="onboard-steps">
      <div class="ostep active" id="os0"></div>
      <div class="ostep" id="os1"></div>
      <div class="ostep" id="os2"></div>
    </div>
    <div class="onboard-step-content" id="onboard-content"></div>
    <div class="onboard-error" id="onboard-error"></div>
    <div class="onboard-actions" id="onboard-actions"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════
   CONFIG
════════════════════════════════════════════ */
const ADMIN_PASSWORD = 'pocketful2025';
const OWNER_GIST_ID  = 'e019b7babf70f4dd72c07d19e2996fcf';
const OWNER_TOKEN    = 'PASTE_YOUR_NEW_TOKEN_HERE';
const GIST_FILE      = 'pocketful.json';
const OWNER_USERNAME = 'AshnahKhalidKhan';

const EMOJIS = ['⚛️','🧮','☁️','🤖','🌍','🎓','🧠','🦾','💡','📄','🎤','🔧','⚙️','🏛️','🚀','🔬','🧬','📡','🛸','⚡','🌐','🔭','💻','🧩','🏆','🎯','🧪','📊','🛠️','🌱','💎','🔮','🎲','🔑','🧲','🛡️','⭐','🌀'];

const TIER_SCALE = {1:0.48, 2:0.78, 3:1.15, 4:1.68, 5:2.35};

/* ════════════════════════════════════════════
   RENDER CONSTANTS
════════════════════════════════════════════ */
// Color extraction
const COLOR_SAMPLE_SIZE    = 48;    // offscreen canvas size for pixel sampling
const DARKEN_FACTOR        = 0.25;  // bg fill darkness multiplier (0–1, lower = darker)

// Achieved orb glow
const GLOW_RINGS           = 3;     // number of soft outer glow rings
const GLOW_RING_GAP        = 3;     // px between each glow ring layer
const GLOW_RING_WIDTH_BASE = 2;     // line width multiplier per ring index
const GLOW_INNER_ALPHA     = 0.65;  // opacity of the solid inner ring
const GLOW_OUTER_ALPHA     = 0.08;  // base opacity for soft rings (divided by ring index)
const GLOW_INNER_OFFSET    = 1.5;   // px beyond radius for the solid ring

// Pending orb outline
const PENDING_STROKE_W     = 1.5;   // dashed stroke width
const PENDING_STROKE_A     = 0.22;  // dashed stroke opacity
const DASH_SEG_SCALE       = 1.2;   // segment count = max(DASH_SEG_MIN, r * DASH_SEG_SCALE)
const DASH_SEG_MIN         = 12;    // minimum arc segment count

// Canvas boundary (visual outer edge per orb type)
const ACHIEVED_GLOW_EDGE   = 9;     // r + this = visual edge for achieved orbs
const PENDING_EDGE         = 1;     // r + this = visual edge for pending orbs

// Status dot
const DOT_SCALE            = 0.12;  // dot radius as fraction of orb radius
const DOT_MIN_R            = 4;     // minimum dot radius px
const DOT_MAX_R            = 10;    // maximum dot radius px
const DOT_CENTRE_BIAS      = 0.55;  // angle weight toward canvas centre (0 = pure seeded, 1 = pure centre)
const DOT_PENDING_ALPHA    = 0.7;   // opacity of pending-state dot

const GRAVITY              = 0.30;  // px/frame² downward acceleration
const ACHIEVED_MASS        = 2.0;   // heavier → falls faster, settles lower
const PENDING_MASS         = 1.0;   // lighter → falls slower, lands higher
const DAMPING              = 0.92;  // velocity multiplier per frame (fluid settling feel)
const RESTITUTION          = 0.04;  // near-zero bounce on collision/boundary
const SOLVER_ITERS         = 12;    // position-based collision solver passes per frame
const COLLISION_MARGIN     = 2;     // px clearance kept between outer visual edges
const ORB_SPAWN_INTERVAL   = 6;     // physics frames between each sequential orb drop (~0.1s at 60fps)

const colorCache = {};

/* ════════════════════════════════════════════
   COLOR EXTRACTION
════════════════════════════════════════════ */
function extractColors(src, isEmoji, id, cb) {
  /* id in colorCache covers both successes {bg,glow} and failure sentinels {} */
  if (id in colorCache) { cb(colorCache[id]); return; }
  const sampleCanvas = document.createElement('canvas');
  sampleCanvas.width = sampleCanvas.height = COLOR_SAMPLE_SIZE;
  const ctx = sampleCanvas.getContext('2d');
  const SZ  = COLOR_SAMPLE_SIZE;

  function process() {
    let redSum=0, greenSum=0, blueSum=0, pixelCount=0, bestSat=0, glowR=180, glowG=180, glowB=180;
    try {
      const px = ctx.getImageData(0, 0, SZ, SZ).data;
      for (let i = 0; i < px.length; i += 4) {
        if (px[i+3] < 30) continue;
        const r=px[i], g=px[i+1], b=px[i+2];
        redSum+=r; greenSum+=g; blueSum+=b; pixelCount++;
        const maxChannel=Math.max(r,g,b), minChannel=Math.min(r,g,b);
        const sat=maxChannel===0 ? 0 : (maxChannel-minChannel)/maxChannel, score=sat*(maxChannel/255);
        if (score > bestSat) { bestSat=score; glowR=r; glowG=g; glowB=b; }
      }
    } catch(e) { console.warn('extractColors: pixel sampling failed (canvas taint?):', e); colorCache[id]={}; cb({}); return; }
    if (!pixelCount) { colorCache[id]={}; cb({}); return; }
    const bg   = hexN(Math.round(redSum/pixelCount*DARKEN_FACTOR), Math.round(greenSum/pixelCount*DARKEN_FACTOR), Math.round(blueSum/pixelCount*DARKEN_FACTOR));
    const glow = hexN(glowR, glowG, glowB);
    colorCache[id] = {bg, glow};
    cb(colorCache[id]);
  }

  if (isEmoji) {
    ctx.clearRect(0, 0, SZ, SZ);
    ctx.font = `${SZ * 0.78}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(src, SZ/2, SZ/2);
    process();
  } else {
    if (src.startsWith('data:')) {
      /* data: URLs must NOT have crossOrigin set — some browsers reject that combination */
      const img = new Image();
      img.onload = () => { ctx.clearRect(0,0,SZ,SZ); ctx.drawImage(img,0,0,SZ,SZ); process(); };
      img.onerror = () => { colorCache[id]={}; cb({}); };
      img.src = src;
    } else {
      /* external URL: try direct first, then CORS proxy */
      const loadImg = (imgSrc, onFail) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => { ctx.clearRect(0,0,SZ,SZ); ctx.drawImage(img,0,0,SZ,SZ); process(); };
        img.onerror = () => onFail ? onFail() : (colorCache[id]={}, cb({}));
        img.src = imgSrc;
      };
      loadImg(src, () => loadImg(`${CORS_PROXY}${encodeURIComponent(src)}`, null));
    }
  }
}

function hexN(r,g,b){
  return '#'+[r,g,b].map(v=>Math.min(255,Math.max(0,v)).toString(16).padStart(2,'0')).join('');
}
function hexToNum(hex){
  return parseInt(hex.replace('#',''),16);
}

/* ════════════════════════════════════════════
   DOT HELPERS
════════════════════════════════════════════ */
function dotRadius(r){ return Math.min(DOT_MAX_R, Math.max(DOT_MIN_R, r * DOT_SCALE)); }

function dotOffset(r, id, cx, cy, W, H){
  const seeded        = ((id*2654435761)>>>0)/4294967296;
  const base          = seeded * Math.PI * 2;
  const toCenterAngle = Math.atan2(H/2-cy, W/2-cx);
  const blend         = DOT_CENTRE_BIAS;
  const angle         = Math.atan2(
    Math.sin(base)*(1-blend)+Math.sin(toCenterAngle)*blend,
    Math.cos(base)*(1-blend)+Math.cos(toCenterAngle)*blend
  );
  return {
    x: cx + Math.cos(angle)*r,
    y: cy + Math.sin(angle)*r,
    r: dotRadius(r)
  };
}

/* ════════════════════════════════════════════
   PHYSICS ENGINE
════════════════════════════════════════════ */
let simNodes = [];

function computeRadius(s, W, H){
  const area    = W * H;
  const totalSq = SKILLS.reduce((a,x) => a + TIER_SCALE[x.tier]**2, 0);
  const unit    = Math.sqrt(area * CANVAS_FILL_RATIO / (totalSq * Math.PI));
  return Math.max(ORB_MIN_RADIUS, Math.round(unit * TIER_SCALE[s.tier]));
}

/* outerR — the visual edge radius used for collision and boundary checks */
function outerR(n) {
  return n.r + (n.achieved ? ACHIEVED_GLOW_EDGE : PENDING_EDGE);
}

/* spawnNode — creates a physics node for a skill at a random x above the canvas */
function spawnNode(s, r, w) {
  const mass = s.achieved ? ACHIEVED_MASS : PENDING_MASS;
  const edge = r + (s.achieved ? ACHIEVED_GLOW_EDGE : PENDING_EDGE);
  const x    = Math.max(edge, Math.min(w - edge, edge + Math.random() * (w - 2 * edge)));
  return { id: s.id, r, achieved: s.achieved, mass, x, y: -r, vx: 0, vy: 0 };
}

/* initPhysics — builds simNodes, preserving positions/velocities for existing nodes.
   On first load (no existing nodes): all orbs are queued into spawnQueue (achieved first,
   then pending) and dropped one-by-one every ORB_SPAWN_INTERVAL frames so achieved orbs
   settle at the bottom before pending orbs arrive.
   On resize / refreshCanvas: existing nodes are clamped to new bounds; new nodes
   (e.g. a newly added skill) drop from above normally. */
function initPhysics(w, h) {
  const radii = {};
  SKILLS.forEach(s => { radii[s.id] = computeRadius(s, w, h); });

  const prevNodes = {};
  simNodes.forEach(n => { prevNodes[n.id] = { x: n.x, y: n.y, vx: n.vx, vy: n.vy }; });

  const isFirstLoad = Object.keys(prevNodes).length === 0;

  if (isFirstLoad) {
    /* Queue all orbs — achieved first, then pending — physicsTick drops one every ORB_SPAWN_INTERVAL frames */
    physicsFrame = 0;
    spawnQueue   = [];
    simNodes     = [];
    const achieved = SKILLS.filter(s =>  s.achieved);
    const pending  = SKILLS.filter(s => !s.achieved);
    [...achieved, ...pending].forEach(s => {
      spawnQueue.push({ s, r: radii[s.id] });
    });
  } else {
    /* Resize or data refresh — preserve existing nodes, drop only new ones */
    spawnQueue = [];
    simNodes = SKILLS.map(s => {
      const r    = radii[s.id];
      const prev = prevNodes[s.id];
      const mass = s.achieved ? ACHIEVED_MASS : PENDING_MASS;
      const edge = r + (s.achieved ? ACHIEVED_GLOW_EDGE : PENDING_EDGE);
      if (prev) {
        return {
          id: s.id, r, achieved: s.achieved, mass,
          x: Math.max(edge, Math.min(w - edge, prev.x)),
          y: Math.max(edge, Math.min(h - edge, prev.y)),
          vx: prev.vx, vy: prev.vy,
        };
      }
      return spawnNode(s, r, w);
    });
  }
}

/* physicsTick — advances the simulation one frame.
   Called by the Pixi ticker (60 fps) before renderFrame().

   Steps:
     A  gravity + damping + position update
     B  boundary response (walls + floor + ceiling)
     C  position-based collision solver (SOLVER_ITERS passes)
     D  re-clamp after solver may have pushed nodes out of bounds */
function physicsTick() {
  const w = W(), h = H();

  /* ── Sequential spawn: drop one orb every ORB_SPAWN_INTERVAL frames ── */
  if (spawnQueue.length > 0 && physicsFrame % ORB_SPAWN_INTERVAL === 0) {
    const { s, r } = spawnQueue.shift();
    simNodes.push(spawnNode(s, r, w));
  }
  physicsFrame++;

  /* ── A: gravity, damping, integrate ── */
  simNodes.forEach(n => {
    n.vy += GRAVITY * n.mass;
    n.vx *= DAMPING;
    n.vy *= DAMPING;
    n.x  += n.vx;
    n.y  += n.vy;
  });

  /* ── B: boundary walls ── */
  simNodes.forEach(n => {
    const edge = outerR(n);
    if (n.y + edge > h) { n.y = h - edge; n.vy = n.vy < 0 ? n.vy : -Math.abs(n.vy) * RESTITUTION; }
    if (n.x - edge < 0) { n.x = edge;     n.vx = Math.abs(n.vx) * RESTITUTION; }
    if (n.x + edge > w) { n.x = w - edge; n.vx = -Math.abs(n.vx) * RESTITUTION; }
    if (n.y - edge < 0) { n.y = edge;     n.vy = Math.abs(n.vy) * RESTITUTION; }
  });

  /* ── C: position-based collision solver ── */
  for (let iter = 0; iter < SOLVER_ITERS; iter++) {
    for (let i = 0; i < simNodes.length; i++) {
      for (let j = i + 1; j < simNodes.length; j++) {
        const a = simNodes[i], b = simNodes[j];
        const minDist = outerR(a) + outerR(b) + COLLISION_MARGIN;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const distSq = dx * dx + dy * dy;
        if (distSq >= minDist * minDist) continue;  // no overlap — skip

        const dist = Math.sqrt(distSq) || 0.001;
        const nx = dx / dist, ny = dy / dist;
        const overlap    = minDist - dist;
        const totalMass  = a.mass + b.mass;

        /* position correction proportional to inverse mass — heavier moves less */
        const aPush = overlap * (b.mass / totalMass);
        const bPush = overlap * (a.mass / totalMass);
        a.x -= nx * aPush;  a.y -= ny * aPush;
        b.x += nx * bPush;  b.y += ny * bPush;

        /* impulse along contact normal — gives the sliding-past behaviour */
        const velDot = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
        if (velDot < 0) {  /* only when approaching */
          const J = -(1 + RESTITUTION) * velDot / (1 / a.mass + 1 / b.mass);
          a.vx -= J / a.mass * nx;  a.vy -= J / a.mass * ny;
          b.vx += J / b.mass * nx;  b.vy += J / b.mass * ny;
        }
      }
    }
  }

  /* ── D: re-clamp after solver may have shifted nodes past walls ── */
  simNodes.forEach(n => {
    const edge = outerR(n);
    if (n.y + edge > h) { n.y = h - edge; if (n.vy > 0) n.vy = 0; }
    if (n.x - edge < 0) { n.x = edge;     if (n.vx < 0) n.vx = 0; }
    if (n.x + edge > w) { n.x = w - edge; if (n.vx > 0) n.vx = 0; }
    if (n.y - edge < 0) { n.y = edge;     if (n.vy < 0) n.vy = 0; }
  });
}

/* ════════════════════════════════════════════
   PIXI RENDER FRAME (called every Pixi ticker tick, after physicsTick)
════════════════════════════════════════════ */
const pixiOrbs  = {};  /* id -> {circle, glow, dot} */
const domLabels = {};  /* id -> {label, hit} */
const W = () => wrap.offsetWidth;
const H = () => wrap.offsetHeight;

function renderFrame() {
  const w = W(), h = H();
  simNodes.forEach(node => {
    const s = findSkill(node.id);
    if (!s) return;
    const {x, y, r} = node;

    /* ── Pixi objects ── */
    if (!pixiOrbs[s.id]) createPixiOrb(s, node);
    updatePixiOrb(s, node, w, h);

    /* ── DOM label ── */
    if (!domLabels[s.id]) createDomLabel(s, node);
    updateDomLabel(s, node);
  });

  /* remove stale */
  Object.keys(pixiOrbs).forEach(id => {
    if (!findSkill(id)) destroyOrb(+id);
  });
}

function createPixiOrb(s, node) {
  const circle = new PIXI.Graphics();
  const glow   = new PIXI.Graphics();
  const dot    = new PIXI.Graphics();
  orbContainer.addChild(circle);
  orbContainer.addChild(dot);
  glowContainer.addChild(glow);
  pixiOrbs[s.id] = {circle, glow, dot};
}

function drawOrbCircle(circle, s, x, y, r) {
  circle.clear();
  if (s.achieved) {
    const fallback = hexToNum(ORB_BG_FALLBACK[s.cat] || '#1a1a2e');
    const bgColor  = colorCache[s.id]?.bg ? hexToNum(colorCache[s.id].bg) : fallback;
    circle.beginFill(bgColor, 1);
    circle.drawCircle(x, y, r);
    circle.endFill();
  } else {
    /* pending: transparent with dashed outline drawn as arc segments */
    circle.lineStyle(PENDING_STROKE_W, 0xffffff, PENDING_STROKE_A);
    const segs = Math.max(DASH_SEG_MIN, Math.round(r * DASH_SEG_SCALE));
    for (let i = 0; i < segs; i += 2) {
      circle.arc(x, y, r, (i / segs) * Math.PI * 2, ((i + 0.8) / segs) * Math.PI * 2);
      circle.closePath();
    }
  }
}

function drawOrbGlow(glow, s, x, y, r) {
  glow.clear();
  if (!s.achieved) return;
  const glowColor = colorCache[s.id]?.glow ? hexToNum(colorCache[s.id].glow) : 0x7F77DD;
  glow.lineStyle(2.5, glowColor, GLOW_INNER_ALPHA);
  glow.drawCircle(x, y, r + GLOW_INNER_OFFSET);
  for (let i = 1; i <= GLOW_RINGS; i++) {
    glow.lineStyle(i * GLOW_RING_WIDTH_BASE, glowColor, GLOW_OUTER_ALPHA / i);
    glow.drawCircle(x, y, r + i * GLOW_RING_GAP);
  }
}

function drawOrbDot(dot, s, x, y, r, w, h) {
  dot.clear();
  const dotPos = dotOffset(r, s.id, x, y, w, h);
  const dotClr = s.achieved
    ? (colorCache[s.id]?.glow ? hexToNum(colorCache[s.id].glow) : 0x7F77DD)
    : 0x7F77DD;
  dot.beginFill(dotClr, s.achieved ? 1 : DOT_PENDING_ALPHA);
  dot.drawCircle(dotPos.x, dotPos.y, dotPos.r);
  dot.endFill();
}

function updatePixiOrb(s, node, w, h) {
  const {circle, glow, dot} = pixiOrbs[s.id];
  const {x, y, r} = node;
  drawOrbCircle(circle, s, x, y, r);
  drawOrbGlow(glow, s, x, y, r);
  drawOrbDot(dot, s, x, y, r, w, h);

  /* trigger extraction only when cache entry is absent (undefined = never tried) */
  if (!(s.id in colorCache)) {
    /* re-renders the orb once color data is available — used as extraction callback */
    const repaintOrb = (skill) => {
      const nd = simNodes.find(n => n.id === skill.id);
      if (nd && pixiOrbs[skill.id]) updatePixiOrb(skill, nd, W(), H());
    };
    extractColors(getIconSrc(s), !s.img, s.id, (colors) => {
      if (!colors?.bg && s.img) {
        /* image URL extraction failed — fall back to the emoji glyph so the orb
           always gets a meaningful tint rather than the generic fallback */
        delete colorCache[s.id];
        extractColors(s.glyph, true, s.id, (gc) => {
          if (!gc?.bg) colorCache[s.id] = {};  /* glyph also failed — prevent infinite retry */
          repaintOrb(s);
        });
      } else {
        repaintOrb(s);
      }
    });
  }
}

function createDomLabel(s, node) {
  const lbl = document.createElement('div');
  lbl.className = 'orb-label';
  lbl.dataset.id = s.id;

  const hit = document.createElement('div');
  hit.className = 'orb-hit';
  hit.dataset.id = s.id;
  hit.addEventListener('click', () => openDetail(s.id));

  lblLayer.appendChild(lbl);
  lblLayer.appendChild(hit);
  domLabels[s.id] = {lbl, hit};
}

/* Returns a font size (px) that keeps s.name wrapped to ≤ MAX_NAME_LINES lines
   inside a text box of width r*1.0, preserving the icon as the dominant element. */
function nameFontSize(name, r) {
  const MAX_NAME_LINES = 3;
  const base = Math.max(9, r * 0.19);
  /* Roboto average character width ≈ 0.52× font-size */
  const charsPerLine = Math.floor((r * 1.0) / (base * 0.52));
  const estLines     = Math.ceil(name.length / Math.max(1, charsPerLine));
  if (estLines <= MAX_NAME_LINES) return base;
  return Math.max(8, base * MAX_NAME_LINES / estLines);
}

function updateDomLabel(s, node) {
  const {lbl, hit} = domLabels[s.id];
  const {x, y, r} = node;
  const showName = r >= 24;

  /* single CSS variable drives all size calc() rules in the stylesheet */
  lbl.style.setProperty('--r', r + 'px');
  lbl.style.left  = x + 'px';
  lbl.style.top   = y + 'px';
  lbl.style.width  = (r * 2) + 'px';
  lbl.style.height = (r * 2) + 'px';

  if (s.img) {
    lbl.style.backgroundImage = '';
    lbl.style.borderRadius    = '';

    /* Persist the <img> element across ticks — avoids re-decoding data: URLs every frame */
    let imgEl = lbl.querySelector('img.orb-img');
    if (!imgEl) {
      lbl.innerHTML = '';
      imgEl = document.createElement('img');
      imgEl.className = 'orb-img';
      imgEl.alt = '';
      lbl.appendChild(imgEl);
    }
    if (imgEl.dataset.orbSrc !== s.img) { imgEl.dataset.orbSrc = s.img; imgEl.src = s.img; }

    let nameEl = lbl.querySelector('.orb-name');
    if (showName) {
      if (!nameEl) { nameEl = document.createElement('span'); nameEl.className = 'orb-name'; lbl.appendChild(nameEl); }
      nameEl.textContent = s.name;
      nameEl.style.fontSize = nameFontSize(s.name, r) + 'px';
    } else if (nameEl) { nameEl.remove(); }

  } else {
    /* Emoji path — use DOM methods to avoid inserting user text via innerHTML */
    if (lbl.querySelector('img.orb-img')) lbl.innerHTML = '';
    lbl.style.backgroundImage = '';
    lbl.style.borderRadius    = '';

    let emojiEl = lbl.querySelector('.orb-emoji');
    if (!emojiEl) {
      lbl.innerHTML = '';
      emojiEl = document.createElement('span');
      emojiEl.className = 'orb-emoji';
      lbl.appendChild(emojiEl);
    }
    if (emojiEl.textContent !== s.glyph) emojiEl.textContent = s.glyph;

    let nameEl = lbl.querySelector('.orb-name');
    if (showName) {
      if (!nameEl) { nameEl = document.createElement('span'); nameEl.className = 'orb-name'; lbl.appendChild(nameEl); }
      if (nameEl.textContent !== s.name) nameEl.textContent = s.name;
      nameEl.style.fontSize = nameFontSize(s.name, r) + 'px';
    } else if (nameEl) { nameEl.remove(); }
  }

  hit.style.left   = x + 'px';
  hit.style.top    = y + 'px';
  hit.style.width  = (r * 2) + 'px';
  hit.style.height = (r * 2) + 'px';
  hit.style.pointerEvents = 'all';
}

function destroyOrb(id) {
  if (pixiOrbs[id]) {
    pixiOrbs[id].circle.destroy();
    pixiOrbs[id].glow.destroy();
    pixiOrbs[id].dot.destroy();
    delete pixiOrbs[id];
  }
  if (domLabels[id]) {
    domLabels[id].lbl.remove();
    domLabels[id].hit.remove();
    delete domLabels[id];
  }
}

/** Applies a loaded skills array — sets SKILLS and advances nextId past the highest existing id. */
function applySkillsData(data) {
  SKILLS  = data;
  nextId  = Math.max(...SKILLS.map(s => s.id)) + 1;
}

function showSyncStatus(msg, isError) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.style.background = isError ? 'rgba(180,40,40,0.18)' : 'rgba(29,158,117,0.15)';
  el.style.color  = isError ? 'rgba(220,80,80,0.85)' : 'rgba(29,158,117,0.8)';
  el.style.border = `0.5px solid ${isError?'rgba(220,80,80,0.25)':'rgba(29,158,117,0.25)'}`;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, SYNC_STATUS_TTL);
}

async function loadFromGist() {
  try {
    const meta = await fetch(`https://api.github.com/gists/${ACTIVE_GIST_ID}`, {
      headers: { 'Authorization': `token ${ACTIVE_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!meta.ok) throw new Error(meta.status);
    const gist = await meta.json();
    const rawUrl = gist.files[GIST_FILE]?.raw_url;
    if (!rawUrl) throw new Error('file missing');
    const raw = await fetch(rawUrl);
    if (!raw.ok) throw new Error('raw failed');
    const data = JSON.parse(await raw.text());
    if (Array.isArray(data) && data.length > 0) {
      applySkillsData(data);
    } else {
      SKILLS = isOwnerView ? DEFAULT_SKILLS : []; nextId = isOwnerView ? 15 : 1;
      if (isOwnerView) await saveToGist();
    }
  } catch(e) {
    console.warn('loadFromGist: primary fetch failed, trying raw fallback:', e);
    try {
      const raw = await fetch(`https://gist.githubusercontent.com/${ACTIVE_USERNAME}/${ACTIVE_GIST_ID}/raw/${GIST_FILE}`);
      if (!raw.ok) throw new Error();
      const data = JSON.parse(await raw.text());
      if (Array.isArray(data) && data.length > 0) {
        applySkillsData(data); return;
      }
    } catch(e2) { console.warn('loadFromGist: raw fallback also failed:', e2); }
    SKILLS = isOwnerView ? DEFAULT_SKILLS : []; nextId = isOwnerView ? 15 : 1;
    showSyncStatus("offline — changes won't sync", true);
  }
}

async function saveToGist() {
  try {
    const res = await fetch(`https://api.github.com/gists/${ACTIVE_GIST_ID}`, {
      method:'PATCH',
      headers:{'Authorization':`token ${ACTIVE_TOKEN}`,'Content-Type':'application/json'},
      body: JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(SKILLS,null,2)}}})
    });
    if (!res.ok) throw new Error(res.status);
    showSyncStatus('saved ✓', false);
  } catch(e) { console.error('saveToGist failed:', e); showSyncStatus('sync failed', true); }
}

function refreshCanvas() {
  /* rebuild physics nodes — new orbs drop from top, existing ones keep position */
  const w=W(), h=H();
  initPhysics(w, h);
  updateXP();
}

function saveSkill() {
  const name=document.getElementById('f-name').value.trim();
  if (!name){ document.getElementById('f-name').focus(); return; }
  const tier=parseInt(document.getElementById('f-tier').value);
  const achieved=selectedStatus==='achieved';
  const img = iconMode==='upload'&&uploadedImg ? uploadedImg : iconMode==='url'&&urlImg ? urlImg : null;
  const editId = document.getElementById('f-edit-id').value;
  if (editId) {
    const s = findSkill(editId);
    if (s){ s.name=name; s.desc=document.getElementById('f-desc').value.trim()||name; s.tier=tier; s.achieved=achieved; s.xp=calcXP(tier); s.img=img; if(!img)s.glyph=selectedEmoji; delete colorCache[s.id]; }
  } else {
    SKILLS.push({id:nextId++,name,desc:document.getElementById('f-desc').value.trim()||name,glyph:selectedEmoji,img,cat:'Other',achieved,xp:calcXP(tier),tier});
  }
  closeModal('add-overlay'); refreshCanvas(); saveToGist();
}

  ).join('');

let _iconSearchTimer = null;
function searchIcons(query) {
  clearTimeout(_iconSearchTimer);
  if (!query.trim()) { buildEmojiGrid(); return; }
  _iconSearchTimer = setTimeout(async () => {
    const grid = document.getElementById('emoji-grid');
    grid.innerHTML = '<div style="color:var(--muted);font-size:11px;padding:6px;font-family:\'DM Mono\',monospace;grid-column:1/-1">searching…</div>';
    try {
      const res  = await fetch(`${ICONIFY_API_BASE}/search?query=${encodeURIComponent(query.trim())}&limit=${ICONIFY_SEARCH_LIMIT}`);
      const data = await res.json();
      if (!data.icons || !data.icons.length) {
        grid.innerHTML = '<div style="color:var(--muted);font-size:11px;padding:6px;font-family:\'DM Mono\',monospace;grid-column:1/-1">no results</div>';
        return;
      }
      grid.innerHTML = data.icons.map(icon => {
        const [prefix, name] = icon.split(':');
        const url = `${ICONIFY_API_BASE}/${prefix}/${name}.svg`;
        const sel = urlImg === url ? ' selected' : '';
        return `<button class="ep-btn${sel}" data-iconurl="${url}" title="${icon}" onclick="pickIconImg('${url}')" style="display:flex;align-items:center;justify-content:center;padding:4px;">` +
          `<img src="${url}" alt="${name}"></button>`;
      }).join('');
    } catch(e) {
      console.warn('searchIcons: Iconify API request failed:', e);
      grid.innerHTML = '<div style="color:var(--muted);font-size:11px;padding:6px;font-family:\'DM Mono\',monospace;grid-column:1/-1">failed to load — check connection</div>';
    }
  }, ICON_SEARCH_DELAY);
}
function pickIconImg(url) {
  urlImg = url; iconMode = 'url';
  document.querySelectorAll('#emoji-grid .ep-btn').forEach(b =>
    b.classList.toggle('selected', b.dataset.iconurl === url)
  );
}
function handleFileUpload(input) {
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    uploadedImg=ev.target.result; iconMode='upload';
    const p=document.getElementById('upload-preview'); p.src=uploadedImg; p.classList.add('show');
  };
  reader.readAsDataURL(file);
}
function handleUrlInput(input) {
  const raw = input.value.trim();
  /* reject non-http(s) protocols (e.g. javascript:) at the input boundary */
  if (raw && !raw.startsWith('https://') && !raw.startsWith('http://')) {
    input.style.borderColor = 'rgba(220,80,80,0.6)';
    return;
  }
  input.style.borderColor = '';
  urlImg = raw; iconMode = 'url';
  const previewEl = document.getElementById('url-preview');
  if (urlImg) { previewEl.src = urlImg; previewEl.classList.add('show'); }
  else previewEl.classList.remove('show');
}
function selectStatus(v) {

  document.getElementById('sb-achieved').className='status-btn'+(v==='achieved'?' sel-achieved':'');
  document.getElementById('sb-pending').className='status-btn'+(v==='pending'?' sel-pending':'');

let obStep=0, obGistId='', obToken='', obUsername='';
const OB_STEPS=[
  { title:'Create your Gist',
    sub:`Go to <a href="https://gist.github.com" target="_blank">gist.github.com</a> and create a new <strong>secret gist</strong>.<br><br>Set the filename to <code>pocketful.json</code> and the content to <code>[]</code><br><br>Once created, copy the <strong>Gist ID</strong> from the URL and paste it below.`,
    placeholder:'Gist ID (long string in the URL)', type:'text' },
  { title:'Create a GitHub token',
    sub:`Go to <a href="https://github.com/settings/tokens" target="_blank">GitHub → Settings → Developer settings → Personal access tokens (classic)</a>.<br><br>Generate a new token, tick only the <strong>gist</strong> scope, and paste it below.<br><br><em style="font-size:11px;color:rgba(255,255,255,0.2)">Stored only in your browser's localStorage — never sent to us.</em>`,
    placeholder:'ghp_...', type:'password' },
  { title:'Your GitHub username',
    sub:`Enter your GitHub username so we can build your shareable URL correctly.`,
    placeholder:'yourusername', type:'text' }
];

function openOnboarding() { obStep=0; obGistId=''; obToken=''; obUsername=''; renderObStep(); openModal('onboard-overlay'); }
function renderObStep() {
  const step=OB_STEPS[obStep];
  document.getElementById('onboard-error').textContent='';
  ['os0','os1','os2'].forEach((id,i)=>{
    document.getElementById(id).className='ostep'+(i<obStep?' done':i===obStep?' active':'');
  });
  document.getElementById('onboard-content').innerHTML=`
    <div class="onboard-title">${step.title}</div>
    <div class="onboard-sub">${step.sub}</div>
    <div class="field"><input type="${step.type}" id="ob-input" placeholder="${step.placeholder}" style="width:100%" onkeydown="if(event.key==='Enter')obNext()"></div>
  `;
  document.getElementById('onboard-actions').innerHTML=`
    ${obStep>0?'<button class="btn" onclick="obBack()">back</button>':'<button class="btn" onclick="closeModal(\'onboard-overlay\')">cancel</button>'}
    <button class="btn primary" onclick="obNext()">${obStep<2?'next →':'connect'}</button>
  `;
  setTimeout(() => document.getElementById('ob-input')?.focus(), ONBOARD_FOCUS_DELAY);
}
function obBack(){ obStep=Math.max(0,obStep-1); renderObStep(); }
async function obNext() {
  const inputValue = document.getElementById('ob-input')?.value.trim();
  const errorEl    = document.getElementById('onboard-error');
  if (!inputValue){ errorEl.textContent='this field is required'; return; }
  if (obStep===0) obGistId=inputValue;
  else if (obStep===1) obToken=inputValue;
  else { obUsername=inputValue; await obFinish(); return; }
  obStep++; renderObStep();
}
async function obFinish() {
  const errorEl   = document.getElementById('onboard-error');
  const actionsEl = document.getElementById('onboard-actions');
  actionsEl.innerHTML='<span style="font-family:Roboto Mono,monospace;font-size:11px;color:var(--muted)">connecting...</span>';
  errorEl.textContent='';
  try {
    const res=await fetch(`https://api.github.com/gists/${obGistId}`,{headers:{'Authorization':`token ${obToken}`}});
    if (!res.ok) throw new Error(res.status===401?'invalid token':res.status===404?'gist not found':`error ${res.status}`);
    const gist=await res.json();
    if (!gist.files[GIST_FILE]) {
      await fetch(`https://api.github.com/gists/${obGistId}`,{method:'PATCH',headers:{'Authorization':`token ${obToken}`,'Content-Type':'application/json'},body:JSON.stringify({files:{[GIST_FILE]:{content:'[]'}}})});
    }
    safeLocalSet(`pocketful_token_${obGistId}`,obToken);
    safeLocalSet(`pocketful_username_${obGistId}`,obUsername);
    const url=`${location.origin}${location.pathname}?id=${obGistId}`;
    document.getElementById('onboard-content').innerHTML=`
      <div class="onboard-success">
        <div class="onboard-success-icon">🎉</div>
        <div class="onboard-success-title">your pocketful is ready</div>
        <div class="onboard-success-sub">Bookmark this link — it's yours. Share it with anyone.</div>
        <div class="copy-url-wrap">
          <input class="copy-url-input" value="${url}" readonly>
          <button class="copy-btn" onclick="navigator.clipboard.writeText('${url}').then(()=>{this.textContent='copied!';setTimeout(()=>this.textContent='copy',2000)})">copy</button>
        </div>
      </div>`;
    actionsEl.innerHTML=`<button class="btn primary" onclick="location.href='${url}'">open my pocketful →</button>`;
    ['os0','os1','os2'].forEach(id=>document.getElementById(id).className='ostep done');
  } catch(e) {
    console.error('obFinish: Gist connection failed:', e);
    errorEl.textContent='could not connect: '+e.message;
    actionsEl.innerHTML='<button class="btn" onclick="obBack()">back</button><button class="btn primary" onclick="obNext()">retry</button>';
  }
}
